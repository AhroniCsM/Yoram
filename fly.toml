# Fly.io configuration for the Yoram Shahar mediation site.
# Deploy with: fly deploy
app = "yoram-shahar"
primary_region = "fra"   # Frankfurt — closest low-latency region to Israel

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.http_options]
    [http_service.http_options.response.headers]
      X-Content-Type-Options = "nosniff"
      X-Frame-Options = "SAMEORIGIN"

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

# Persistent volume for the append-only leads log (survives deploys/restarts).
[[mounts]]
  source = "yoram_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
